<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CADD Portfolio</title>
    <style>
        :root { --primary: #1e293b; --accent: #0ea5e9; --bg: #f8fafc; --text: #334155; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); }
        
        #sidebar { width: 260px; background: #1e293b; color: white; padding: 25px 20px; }
        .menu-item { padding: 12px; border-radius: 8px; margin-top: 10px; cursor: pointer; color: #94a3b8; }
        .menu-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--accent); }
        
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px 30px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        
        #table-area { flex: 1; overflow-y: auto; padding: 0 30px 20px 30px; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 16px 12px; text-align: left; background: white; color: #64748b; font-size: 14px; border-bottom: 2px solid #e2e8f0; }
        .col-struct { min-width: 250px !important; width: 250px !important; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; cursor: pointer; font-size: 14px; }
        tr:hover td { background: #f0f9ff; }
        tr.active-row td { background: #e0f2fe; }
        .thumb-img { width: 200px; height: 120px; object-fit: contain; mix-blend-mode: multiply; }
        
        #viewer { width: 420px; background: #f8fafc; padding: 30px; border-left: 1px solid #e2e8f0; overflow-y: auto; }
        .mol-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .phys-box { background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="font-size: 1.1rem; color: #94a3b8; margin-top:0;">Targets</h2>
    <div id="menu-container"></div>
</div>

<div id="main">
    <div class="header">
        <h2 style="margin:0; font-size: 18px; color: var(--primary);">Virtual Hit List</h2>
        <input type="text" id="search-input" style="padding:8px 15px; border:1px solid #cbd5e1; border-radius:6px; width:200px;" placeholder="Search ID..." onkeyup="filterTable()">
    </div>
    <div id="table-area">
        <table>
            <thead><tr id="table-head-row"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="viewer">
    <div class="mol-card">
        <div style="color: #64748b; font-size: 15px; font-weight: 500;">Hit compound</div>
        <h3 id="mol-id" style="color: var(--primary); font-size: 24px; margin: 5px 0 20px 0;">Select a Hit</h3>
        <img id="mol-image" style="width:100%; max-width:350px; display:none;">
        <div id="mol-details"></div>
    </div>
</div>

<script>
    let hitsData = [], currentHeaders = [];
    const fullNames = {
        'MW': 'Molecular Weight', 'LogP': 'LogP', 'TPSA': 'Topological Polar Surface Area',
        'HBD': 'Hydrogen Bond Donors', 'HBA': 'Hydrogen Bond Acceptors', 
        'Rotatable Bonds': 'Rotatable Bonds', 'SA Score': 'Synthetic Accessibility Score'
    };

    // 1. Logic tải Menu và Dữ liệu
    const urlParams = new URLSearchParams(window.location.search);
    const currentId = urlParams.get('project') || 'ox1r_hits'; // Project mặc định

    // Load Menu
    fetch('data/projects.json')
        .then(res => res.json())
        .then(projects => {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            projects.forEach(p => {
                const div = document.createElement('div');
                div.className = `menu-item ${p.id === currentId ? 'active' : ''}`;
                div.innerText = p.name;
                div.onclick = () => window.location.href = `?project=${p.id}`;
                container.appendChild(div);
            });
        })
        .catch(err => console.error("Menu load error:", err));

    // Load dữ liệu
    fetch(`data/${currentId}.json`)
        .then(res => res.json())
        .then(data => {
            hitsData = data;
            currentHeaders = Object.keys(data[0]).filter(k => 
                !['mol_image', 'id', 'smiles', 'ID', 'SMILES', 'MW', 'LogP', 'TPSA', 'HBD', 'HBA', 'Rotatable Bonds', 'SA Score'].includes(k)
            );
            renderHeaders(); 
            renderTableBody(hitsData);
        })
        .catch(err => console.error("Data load error:", err));

    function renderHeaders() {
        const row = document.getElementById('table-head-row');
        row.innerHTML = '<th>ID</th><th class="col-struct">Structure</th>';
        currentHeaders.forEach(h => row.innerHTML += `<th>${h}</th>`);
    }

    function renderTableBody(data) {
        const body = document.getElementById('table-body');
        body.innerHTML = '';
        data.forEach(hit => {
            const tr = document.createElement('tr');
            tr.onclick = () => renderDetail(hit, tr);
            let html = `<td><b>${hit.id || hit.ID}</b></td><td class="col-struct">${hit.mol_image ? `<img src="${hit.mol_image}" class="thumb-img">` : '-'}</td>`;
            currentHeaders.forEach(h => html += `<td>${parseFloat(hit[h]) ? parseFloat(hit[h]).toFixed(3) : hit[h]}</td>`);
            tr.innerHTML = html;
            body.appendChild(tr);
        });
    }

    function renderDetail(hit, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-row'));
        tr.classList.add('active-row');
        document.getElementById('mol-id').innerText = hit.id || hit.ID;
        document.getElementById('mol-image').src = hit.mol_image; 
        document.getElementById('mol-image').style.display = 'block';
        
        let det = '';
        currentHeaders.forEach(h => det += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-weight:600;"><span>${h}:</span><span>${hit[h]}</span></div>`);
        
        det += '<div class="phys-box">';
        Object.keys(fullNames).forEach(k => {
            if(hit[k] !== undefined) det += `<div style="display:flex; justify-content:space-between; margin-bottom:4px; font-size:13px;"><span>${fullNames[k]}:</span><b>${hit[k]}</b></div>`;
        });
        det += '</div>';

        document.getElementById('mol-details').innerHTML = det;
    }

    function filterTable() {
        const q = document.getElementById('search-input').value.toLowerCase();
        renderTableBody(hitsData.filter(h => (h.id||h.ID||'').toString().toLowerCase().includes(q)));
    }
</script>
</body>
</html>
