<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CADD Virtual Screening Portfolio</title>
    <script src="https://unpkg.com/@rdkit/rdkit@2023.09.4/dist/RDKit_minimal.js"></script>
    <style>
        :root { --primary: #1e293b; --accent: #0ea5e9; --bg: #f8fafc; --text: #334155; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); }
        
        /* Màn hình chờ RDKit */
        #rdkit-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #sidebar { width: 260px; background: var(--primary); color: white; padding: 25px 20px; z-index: 10; }
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: white; }
        #table-area { flex: 1; overflow-y: auto; padding: 20px 30px; background: white; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f1f5f9; padding: 14px 12px; text-align: left; position: sticky; top: 0; color: #64748b; text-transform: uppercase; font-size: 12px; font-weight: 700; border-bottom: 2px solid #e2e8f0; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        tr:hover { background: #f0f9ff; }
        tr.active-row { background: #e0f2fe; border-left: 3px solid var(--accent); }
        #viewer { width: 400px; background: #f8fafc; padding: 30px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; border-left: 1px solid #e2e8f0; }
        .mol-card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box; text-align: center; border: 1px solid #e2e8f0; }
        canvas { background: white; border-radius: 8px; margin-bottom: 20px; max-width: 100%; height: auto; border: 1px solid #e2e8f0; }
        .badge { background: #f1f5f9; color: #475569; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-family: monospace; font-size: 13px; }
        #error-msg { color: #ef4444; font-weight: bold; padding: 20px; text-align: center; display: none; }
    </style>
</head>
<body>

<div id="rdkit-loader">
    <div class="spinner"></div>
    <h3 style="margin:0; color: var(--primary);">Khởi động RDKit Engine...</h3>
    <p style="color: #64748b; font-size: 14px;">Đang tải WebAssembly (khoảng 2MB). Quá trình này chỉ diễn ra ở lần truy cập đầu tiên.</p>
</div>

<div id="sidebar">
    <h2 style="font-size: 1.1rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top:0;">Campaigns</h2>
    <div id="project-label" style="padding:12px 15px; background: rgba(255,255,255,0.1); border-radius:8px; margin-top: 20px; font-weight: 600; border-left: 4px solid var(--accent);">
        Loading...
    </div>
</div>

<div id="main">
    <div class="header">
        <h2 id="main-title" style="margin:0; font-size: 1.5rem; color: var(--primary);">Virtual Screening Portfolio</h2>
    </div>
    
    <div id="error-msg">❌ Không tìm thấy dữ liệu dự án này. Vui lòng kiểm tra lại đường dẫn.</div>

    <div id="table-area">
        <table id="hits-table">
            <thead>
                <tr>
                    <th>Compound ID</th>
                    <th>Affinity (kcal/mol)</th>
                    <th>MW</th>
                    <th>LogP</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="viewer">
    <div class="mol-card">
        <h3 id="mol-id" style="margin-top:0; color:var(--primary); font-size: 1.3rem;">Select a Hit</h3>
        
        <canvas id="mol-canvas" width="300" height="300"></canvas>
        
        <div id="mol-details" style="text-align: left; font-size: 14px; color: #475569; line-height: 1.8;"></div>
    </div>
</div>

<script>
    let RDKitModule = null;
    let hitsData = [];

    // BƯỚC 1: KHỞI TẠO RDKIT TRƯỚC KHI ĐỌC DATA
    window.onload = function() {
        window.initRDKitModule({
            // Ép trình duyệt tìm file wasm ở đúng địa chỉ này
            locateFile: function() {
                return 'https://unpkg.com/@rdkit/rdkit@2023.09.4/dist/RDKit_minimal.wasm';
            }
        }).then(function(instance) {
            RDKitModule = instance;
            document.getElementById('rdkit-loader').style.display = 'none'; // Tắt màn hình loading
            loadProjectData(); // Bắt đầu đọc file JSON
        }).catch(function(err) {
            document.getElementById('rdkit-loader').innerHTML = `
                <h3 style="color:#ef4444;">❌ Lỗi tải RDKit Engine</h3>
                <p>Chi tiết lỗi: ${err}</p>
                <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer;">Thử lại</button>
            `;
            console.error(err);
        });
    };

    // BƯỚC 2: ĐỌC FILE JSON TỪ THƯ MỤC DATA (Giữ nguyên logic cũ)
    function loadProjectData() {
        const urlParams = new URLSearchParams(window.location.search);
        const projectName = urlParams.get('project') || 't2dm_hits'; 
        
        document.getElementById('project-label').innerText = "🎯 " + projectName.replace(/_/g, ' ').toUpperCase();

        fetch(`data/${projectName}.json`)
            .then(response => {
                if (!response.ok) throw new Error('File not found');
                return response.json();
            })
            .then(data => {
                hitsData = data;
                initTable();
            })
            .catch(err => {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('table-area').style.display = 'none';
            });
    }

    // BƯỚC 3: ĐỔ DỮ LIỆU RA BẢNG
    function initTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        hitsData.forEach((hit) => {
            const tr = document.createElement('tr');
            tr.id = `row-${hit.id}`;
            tr.innerHTML = `
                <td><span class="badge">${hit.id}</span></td>
                <td style="color: #0369a1; font-weight: 700;">${hit.energy}</td>
                <td>${hit.mw || 'N/A'}</td>
                <td>${hit.logp || 'N/A'}</td>
            `;
            tr.onclick = () => renderMolecule(hit, tr);
            tbody.appendChild(tr);
        });

        if(hitsData.length > 0) {
            renderMolecule(hitsData[0], document.getElementById(`row-${hitsData[0].id}`));
        }
    }

    // BƯỚC 4: VẼ CẤU TRÚC BẰNG RDKIT
    function renderMolecule(hit, rowElement) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-row'));
        if(rowElement) rowElement.classList.add('active-row');

        document.getElementById('mol-id').innerText = hit.id;
        document.getElementById('mol-details').innerHTML = `
            <hr style="border:0; border-top:1px dashed #cbd5e1; margin:20px 0;">
            <div style="display:flex; justify-content:space-between;"><span><b>Affinity:</b></span><span style="color:var(--accent); font-weight:bold;">${hit.energy} kcal/mol</span></div>
            <div style="display:flex; justify-content:space-between;"><span><b>MW:</b></span><span>${hit.mw || 'N/A'}</span></div>
            <div style="display:flex; justify-content:space-between;"><span><b>LogP:</b></span><span>${hit.logp || 'N/A'}</span></div>
            <div style="margin-top:15px;"><b style="font-size:12px; color:#94a3b8;">SMILES:</b><div style="background:#f1f5f9; padding:8px; border-radius:6px; margin-top:5px; font-family:monospace; font-size:11px; word-break:break-all;">${hit.smiles}</div></div>
        `;

        // Dùng RDKit vẽ trực tiếp lên Canvas
        const canvas = document.getElementById('mol-canvas');
        try {
            const mol = RDKitModule.get_mol(hit.smiles);
            
            // Cấu hình nét vẽ chuyên nghiệp
            const drawOptions = {
                width: 300,
                height: 300,
                bondLineWidth: 2.0,      // Làm đậm liên kết
                multipleBondOffset: 0.2, // Tách rõ liên kết đôi
                addStereoAnnotation: true, // Hiển thị lập thể
                clearBackground: true
            };
            
            mol.draw_to_canvas_with_highlights(canvas, JSON.stringify(drawOptions));
            mol.delete(); // Xóa khỏi bộ nhớ sau khi vẽ xong
        } catch (error) {
            console.error("Lỗi vẽ SMILES bằng RDKit:", error);
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = "14px Arial";
            ctx.fillStyle = "red";
            ctx.fillText("Lỗi cấu trúc SMILES", 50, 150);
        }
    }
</script>

</body>
</html>
